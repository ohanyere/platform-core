apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: http-5xx-rate-check
  namespace: argo-rollouts
spec:
  args:
    - name: service-name
    - name: namespace
  metrics:
    - name: http-5xx-rate
      interval: 30s
      count: 10
      successCondition: result[0] < 1
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc:9090
          query: |
            sum(rate(istio_requests_total{destination_service_name="{{args.service-name}}",destination_workload_namespace="{{args.namespace}}",response_code=~"5.."}[1m]))


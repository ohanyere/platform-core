---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-latest-image-tags
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Images must use immutable tags or digests; ':latest' is not allowed.
        foreach:
          - list: "request.object.spec.containers[]"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ contains(element.image, ':') }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.initContainers[] || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ contains(element.image, ':') }}"
                    operator: Equals
                    value: false

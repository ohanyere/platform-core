apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: idp-managed-services-dev
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/ohanyere/platform-core.git
        revision: main
        pathParamPrefix: fleet
        files:
          - path: gitops/fleet/services/dev/*.yaml
  template:
    metadata:
      name: "{{ .service }}-dev"
      labels:
        app.kubernetes.io/part-of: idp-services
        platform.idp/environment: dev
        platform.idp/service: "{{ .service }}"
    spec:
      project: idp-services
      source:
        repoURL: "{{ .repoURL }}"
        targetRevision: "{{ .branch }}"
        path: "{{ .path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

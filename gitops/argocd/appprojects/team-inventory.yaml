apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: team-inventory
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  description: Inventory team applications.
  sourceRepos:
    - https://github.com/ohanyere/inventory-*.git
  destinations:
    - namespace: inventory-*
      server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  clusterResourceWhitelist: []

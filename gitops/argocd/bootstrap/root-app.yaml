apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-core-root
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/ohanyere/platform-core.git
    targetRevision: main
    path: gitops/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

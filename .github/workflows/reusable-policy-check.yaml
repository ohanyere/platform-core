name: Reusable Policy Check

on:
  workflow_call:
    inputs:
      manifest_path:
        description: Path containing Kubernetes manifests.
        required: false
        default: .
        type: string

permissions:
  contents: read

jobs:
  policy:
    name: Validate Manifests And Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout platform-core policies
        uses: actions/checkout@v4
        with:
          repository: ohanyere/platform-core
          path: platform-core

      - name: Install tools
        run: |
          curl -sSL -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
          curl -sSL -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/conftest

      - name: Kubeconform validation
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
        run: |
          if [ -f "$MANIFEST_PATH/kustomization.yaml" ]; then
            kubectl kustomize "$MANIFEST_PATH" | kubeconform -summary -strict -ignore-missing-schemas
          else
            kubeconform -summary -strict -ignore-missing-schemas "$MANIFEST_PATH"
          fi

      - name: OPA policy validation
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
        run: |
          if [ -f "$MANIFEST_PATH/kustomization.yaml" ]; then
            kubectl kustomize "$MANIFEST_PATH" | conftest test - --policy platform-core/policies/opa
          else
            conftest test "$MANIFEST_PATH" --policy platform-core/policies/opa
          fi

      - name: Required label validation
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
        run: |
          if [ -f "$MANIFEST_PATH/kustomization.yaml" ]; then
            kubectl kustomize "$MANIFEST_PATH" | conftest test - --policy platform-core/policies/opa --namespace labels
          else
            conftest test "$MANIFEST_PATH" --policy platform-core/policies/opa --namespace labels
          fi

      - name: Latest tag validation
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
        run: |
          if [ -f "$MANIFEST_PATH/kustomization.yaml" ]; then
            kubectl kustomize "$MANIFEST_PATH" | conftest test - --policy platform-core/policies/opa --namespace images
          else
            conftest test "$MANIFEST_PATH" --policy platform-core/policies/opa --namespace images
          fi

      - name: Resource limits validation
        run: |
          echo "Resource request and limit checks are enforced by Kyverno in-cluster and by reusable policy bundles for service repos."

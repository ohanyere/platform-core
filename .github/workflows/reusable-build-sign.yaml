name: Reusable Build And Sign

on:
  workflow_call:
    inputs:
      service_name:
        description: Service repository image name.
        required: true
        type: string
      dockerhub_namespace:
        description: Docker Hub namespace or organization.
        required: true
        type: string
      image_tag:
        description: Image tag to build and sign.
        required: true
        type: string
      dockerfile_path:
        description: Dockerfile path relative to repository root.
        required: false
        default: Dockerfile
        type: string
      context_path:
        description: Build context path relative to repository root.
        required: false
        default: .
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-sign:
    name: Build, Push, And Sign
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: docker.io/${{ inputs.dockerhub_namespace }}/${{ inputs.service_name }}:${{ inputs.image_tag }}
      HAS_COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ env.IMAGE_REF }}
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with keyless identity
        if: ${{ env.HAS_COSIGN_PRIVATE_KEY != 'true' }}
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "${IMAGE_REF}"

      - name: Sign image with configured key fallback
        if: ${{ env.HAS_COSIGN_PRIVATE_KEY == 'true' }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          printf '%s' "${COSIGN_PRIVATE_KEY}" > cosign.key
          cosign sign --yes --key cosign.key "${IMAGE_REF}"
          rm -f cosign.key

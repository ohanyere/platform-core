name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      image_ref:
        description: Fully qualified image reference to scan.
        required: true
        type: string
      scan_path:
        description: Filesystem path to scan.
        required: false
        default: .
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy Filesystem And Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filesystem scan
        id: trivy_fs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan_path }}
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          version: v0.71.2

      - name: Upload filesystem SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ steps.trivy_fs.outcome == 'success' && hashFiles('trivy-fs.sarif') != '' }}
        with:
          sarif_file: trivy-fs.sarif

      - name: Image scan
        id: trivy_image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          version: v0.71.2
          skip-setup-trivy: true

      - name: Upload image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ steps.trivy_image.outcome == 'success' && hashFiles('trivy-image.sarif') != '' }}
        with:
          sarif_file: trivy-image.sarif

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image_ref }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          version: v0.71.2
          skip-setup-trivy: true
